<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pass Benchmark History</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 20px; background: #f5f5f5; color: #333; }
    .container { max-width: 1400px; margin: 0 auto; background: white; padding: 30px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
    h1 { color: #333; border-bottom: 3px solid #4CAF50; padding-bottom: 10px; margin-top: 0; }
    .meta { color: #777; font-size: 0.9em; margin: 0 0 20px; }
    .charts-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 24px; }
    .chart-card { background: #fafafa; border: 1px solid #e0e0e0; border-radius: 6px; padding: 16px; }
    @media (max-width: 800px) { .charts-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="container">
    <h1>Pass Benchmark History</h1>
    <p class="meta">Entries: 3 | Latest: 2026-04-25 | Ratios below 1.0 mean CIRCT is better than ABC.</p>
    <div class="charts-grid">
      <div class="chart-card"><canvas id="chart-lut_mapping_time"></canvas></div>
      <div class="chart-card"><canvas id="chart-sop_balancing_time"></canvas></div>
      <div class="chart-card"><canvas id="chart-lut_count"></canvas></div>
      <div class="chart-card"><canvas id="chart-lut_depth"></canvas></div>
      <div class="chart-card"><canvas id="chart-aig_count"></canvas></div>
      <div class="chart-card"><canvas id="chart-aig_depth"></canvas></div>
    </div>
  </div>
  <script>
    const DATA = {"dates": ["2026-04-18", "2026-04-19", "2026-04-25"], "circt_versions": ["CIRCT firtool-1.144.0-126-g6273dde67", "CIRCT firtool-1.144.0-126-g6273dde67", "CIRCT firtool-1.145.0-6-gd07f832f1"], "abc_versions": ["CIRCT firtool-1.144.0-126-g6273dde67", "CIRCT firtool-1.144.0-126-g6273dde67", "CIRCT firtool-1.145.0-6-gd07f832f1"], "metrics": [{"key": "lut_mapping_time", "label": "LUT Mapping Time Ratio (CIRCT/ABC)", "values": [0.9126189954028531, 0.9056593374885128, 0.9062701802424951], "matched": [68, 69, 69]}, {"key": "sop_balancing_time", "label": "SOP Balancing Time Ratio (CIRCT/ABC)", "values": [0.7455107724132153, 0.7582136169658269, 0.7611810929743044], "matched": [76, 76, 76]}, {"key": "lut_count", "label": "LUT Count Ratio (CIRCT/ABC)", "values": [1.246610996270837, 1.246610996270837, 1.246610996270837], "matched": [76, 76, 76]}, {"key": "lut_depth", "label": "LUT Depth Ratio (CIRCT/ABC)", "values": [1.0000635361578918, 1.0000635361578918, 1.0000635361578918], "matched": [76, 76, 76]}, {"key": "aig_count", "label": "AIG Count Ratio (CIRCT/ABC)", "values": [1.7368747435500131, 1.7368747435500131, 1.7368747435500131], "matched": [76, 76, 76]}, {"key": "aig_depth", "label": "AIG Depth Ratio (CIRCT/ABC)", "values": [1.0110461191187867, 1.0110461191187867, 1.0110461191187867], "matched": [76, 76, 76]}]};
    function makeChart(metric) {
      const ctx = document.getElementById(`chart-${metric.key}`);
      if (!ctx) return;
      new Chart(ctx, {
        type: 'line',
        data: {
          labels: DATA.dates,
          datasets: [{
            label: metric.label,
            data: metric.values,
            borderColor: '#4CAF50',
            backgroundColor: 'rgba(76, 175, 80, 0.15)',
            tension: 0.2,
            spanGaps: true,
          }],
        },
        options: {
          responsive: true,
          maintainAspectRatio: true,
          plugins: {
            legend: { display: false },
            tooltip: {
              callbacks: {
                afterLabel: (ctx) => {
                  const i = ctx.dataIndex;
                  const matched = metric.matched[i];
                  const circt = DATA.circt_versions[i];
                  const abc = DATA.abc_versions[i];
                  return [`Matched: ${matched}`, `CIRCT: ${circt}`, `ABC: ${abc}`];
                },
              },
            },
          },
          scales: {
            y: {
              title: { display: true, text: 'Ratio' },
            },
          },
        },
        plugins: [{
          id: 'baseline',
          afterDraw(chart) {
            const yScale = chart.scales.y;
            const y = yScale.getPixelForValue(1.0);
            const {ctx, chartArea} = chart;
            ctx.save();
            ctx.strokeStyle = 'rgba(0, 0, 0, 0.35)';
            ctx.setLineDash([5, 5]);
            ctx.beginPath();
            ctx.moveTo(chartArea.left, y);
            ctx.lineTo(chartArea.right, y);
            ctx.stroke();
            ctx.restore();
          },
        }],
      });
    }
    DATA.metrics.forEach(makeChart);
  </script>
</body>
</html>
