name: Setup Tracker
description: Install uv, Python dependencies, and build aig-judge

runs:
  using: composite
  steps:
    - name: Install uv
      shell: bash
      run: |
        curl -LsSf https://astral.sh/uv/install.sh | sh
        echo "$HOME/.local/bin" >> $GITHUB_PATH
        echo "$HOME/.cargo/bin" >> $GITHUB_PATH

    - name: Install Python dependencies
      shell: bash
      run: uv sync

    - name: Build aig-judge
      shell: bash
      run: uv run prepare

    - name: Cache Bitwuzla
      uses: actions/cache@v4
      id: bitwuzla-cache
      with:
        path: /tmp/bitwuzla-cache
        key: bitwuzla-${{ runner.os }}-${{ runner.arch }}

    - name: Download Bitwuzla
      shell: bash
      env:
        BITWUZLA_CACHE_DIR: /tmp/bitwuzla-cache
      run: bash .github/scripts/install-bitwuzla.sh
