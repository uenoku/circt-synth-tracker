name: Build CIRCT At SHA
description: Checkout llvm/circt at a specific ref and build circt-synth with shared CI settings

inputs:
  ref:
    description: 'Git ref (SHA/branch/tag) to checkout from llvm/circt'
    required: true
  checkout_path:
    description: 'Path to checkout CIRCT into'
    required: true
  build_path:
    description: 'Build directory path (for cmake -B and ninja -C)'
    required: true
  mlir_dir:
    description: 'MLIR CMake config directory'
    required: true
  llvm_dir:
    description: 'LLVM CMake config directory'
    required: true
  patch:
    description: 'Optional path to a patch file (relative to GITHUB_WORKSPACE) to apply after checkout'
    required: false
    default: ''

runs:
  using: composite
  steps:
    - name: Checkout CIRCT
      uses: actions/checkout@v4
      with:
        repository: llvm/circt
        ref: ${{ inputs.ref }}
        submodules: false
        path: ${{ inputs.checkout_path }}

    - name: Apply patch
      if: ${{ inputs.patch != '' }}
      shell: bash
      run: |
        cd "${{ inputs.checkout_path }}"
        PATCH_FILE="$GITHUB_WORKSPACE/${{ inputs.patch }}"
        EXPECTED_COUNT=$(grep -c "^diff --git" "$PATCH_FILE")
        echo "Patch contains $EXPECTED_COUNT diff block(s)"
        if ! git apply "$PATCH_FILE" --3way; then
          echo "::error::Failed to apply patch '${{ inputs.patch }}' to CIRCT at ${{ inputs.ref }}"
          exit 1
        fi
        # Verify all diff blocks were applied. git apply --3way can silently skip
        # blocks when neither 3-way merge nor direct application succeeds, yet still
        # return exit code 0. Detect this by comparing the expected number of changed
        # files (from the patch) with the actual number of changes in the working tree.
        # Count modified/deleted tracked files and newly added (untracked) files separately
        # to correctly handle patches that add new files.
        MODIFIED=$(git diff --name-only HEAD | wc -l)
        NEW=$(git ls-files --others --exclude-standard | wc -l)
        ACTUAL_COUNT=$((MODIFIED + NEW))
        if [ "$ACTUAL_COUNT" -lt "$EXPECTED_COUNT" ]; then
          echo "::error::Patch '${{ inputs.patch }}' was not fully applied to CIRCT at ${{ inputs.ref }}: expected $EXPECTED_COUNT file change(s), but only $ACTUAL_COUNT were applied. Some diff blocks were silently skipped by 'git apply --3way'."
          echo "Git status:"
          git status
          exit 1
        fi
        echo "Applied patch: ${{ inputs.patch }} ($ACTUAL_COUNT/$EXPECTED_COUNT file(s) changed)"

    - name: Configure and build circt-synth
      shell: bash
      run: |
        cmake -GNinja "${{ inputs.checkout_path }}" \
          -B "${{ inputs.build_path }}" \
          -DCMAKE_BUILD_TYPE=Release \
          -DLLVM_ENABLE_ASSERTIONS=ON \
          -DMLIR_DIR="${{ inputs.mlir_dir }}" \
          -DLLVM_DIR="${{ inputs.llvm_dir }}" \
          -DLLVM_USE_LINKER=lld \
          -DCMAKE_C_COMPILER=clang \
          -DCMAKE_CXX_COMPILER=clang++ \
          -DCIRCT_ENABLE_BINDINGS_PYTHON=OFF \
          -DCIRCT_SLANG_FRONTEND_ENABLED=OFF \
          -DBUILD_SHARED_LIBS=ON \
          -DLLVM_LINK_LLVM_DYLIB=OFF \
          -DCMAKE_C_COMPILER_LAUNCHER=sccache \
          -DCMAKE_CXX_COMPILER_LAUNCHER=sccache
        ninja -C "${{ inputs.build_path }}" -j"$(nproc)" circt-synth
