name: AIG Pass Benchmark

on:
  schedule:
    - cron: '0 13 * * *'
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      lut_sizes:
        description: 'Comma-separated LUT sizes K (e.g. "6,8")'
        required: false
        default: '6,8'
      cut_sizes:
        description: 'Comma-separated cut sizes C (e.g. "8,15")'
        required: false
        default: '8,15'

permissions:
  contents: write
  pages: write

jobs:
  benchmark:
    name: CIRCT vs ABC Pass Compile Time
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/circt/images/circt-ci-build:20260107030736
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install gh and jq
        run: |
          apt-get update && apt-get install -y jq
          curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg \
            | dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg
          chmod go+r /usr/share/keyrings/githubcli-archive-keyring.gpg
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" \
            | tee /etc/apt/sources.list.d/github-cli.list > /dev/null
          apt-get update
          apt-get install -y gh

      - name: Download pre-built CIRCT (LLVM/MLIR install)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          RUN_ID=$(gh run list \
            --repo llvm/circt \
            --workflow uploadReleaseArtifacts.yml \
            --branch main \
            --status success \
            --limit 1 \
            --json databaseId \
            --jq '.[0].databaseId')
          ARTIFACT_SHA=$(gh run view "$RUN_ID" --repo llvm/circt --json headSha --jq '.headSha')
          echo "ARTIFACT_SHA=$ARTIFACT_SHA" >> $GITHUB_ENV
          echo "Artifact build commit: ${ARTIFACT_SHA:0:8}"
          gh run download "$RUN_ID" \
            --repo llvm/circt \
            --name "circt-full-shared-linux-x64.tar.gz" \
            --dir .
          mkdir -p circt-prebuilt
          tar xzf circt-full-shared-linux-x64.tar.gz -C circt-prebuilt/
          MLIR_CMAKE_DIR=$(find "$GITHUB_WORKSPACE/circt-prebuilt" -name "MLIRConfig.cmake" -type f -exec dirname {} \; | head -1)
          LLVM_CMAKE_DIR=$(find "$GITHUB_WORKSPACE/circt-prebuilt" -name "LLVMConfig.cmake" -type f -exec dirname {} \; | head -1)
          PREBUILT_LIB_DIR=$(dirname "$(dirname "$LLVM_CMAKE_DIR")")
          echo "MLIR_DIR=$MLIR_CMAKE_DIR" >> $GITHUB_ENV
          echo "LLVM_DIR=$LLVM_CMAKE_DIR" >> $GITHUB_ENV
          echo "LD_LIBRARY_PATH=$PREBUILT_LIB_DIR${LD_LIBRARY_PATH:+:$LD_LIBRARY_PATH}" >> $GITHUB_ENV

      - name: Setup sccache (for CIRCT compilation)
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: sccache-circt-${{ runner.os }}-20260107030736
          restore-keys: sccache-circt-${{ runner.os }}-
          max-size: 1G
          variant: sccache

      - name: Build CIRCT at artifact SHA with CaDiCaL
        uses: ./.github/actions/build-circt-at-sha
        with:
          ref: ${{ env.ARTIFACT_SHA }}
          checkout_path: circt-src
          build_path: circt-src/build
          mlir_dir: ${{ env.MLIR_DIR }}
          llvm_dir: ${{ env.LLVM_DIR }}

      - name: Add CIRCT to PATH
        run: echo "$GITHUB_WORKSPACE/circt-src/build/bin" >> $GITHUB_PATH

      - name: Get CIRCT version
        run: |
          CIRCT_VERSION=$(circt-synth --version | tail -1 | xargs)
          echo "CIRCT_VERSION=$CIRCT_VERSION" >> $GITHUB_ENV
          echo "CIRCT Version: $CIRCT_VERSION"

      - name: Setup tracker
        uses: ./.github/actions/setup-tracker

      - name: Run pass benchmarks with lit
        run: |
          source .venv/bin/activate
          LUT_SIZES="${{ github.event.inputs.lut_sizes || '6,8' }}"
          CUT_SIZES="${{ github.event.inputs.cut_sizes || '8,15' }}"
          IFS=',' read -ra LUT_ARR <<< "$LUT_SIZES"
          IFS=',' read -ra CUT_ARR <<< "$CUT_SIZES"
          for TOOL in circt abc; do
            TOOL_OUT_DIR="build_pass/$TOOL"
            for L in "${LUT_ARR[@]}"; do
              for C in "${CUT_ARR[@]}"; do
                lit -v benchmarks/pass/ \
                  -j "$(nproc)" \
                  -DTEST_OUTPUT_DIR="$TOOL_OUT_DIR" \
                  -DLUT_SIZE=$L \
                  -DCUT_SIZE=$C \
                  -DTOOL=$TOOL
              done
            done
          done

      - name: Aggregate pass benchmark results
        run: |
          source .venv/bin/activate
          aggregate-results --tool 'circt-*-pass' --version "$CIRCT_VERSION" --results-dir build_pass/circt -o circt-summary.json
          aggregate-results --tool 'abc-*-pass' --version "$CIRCT_VERSION" --results-dir build_pass/abc -o abc-summary.json

      - name: Build pass benchmark reports
        run: |
          source .venv/bin/activate
          pass-pr-compare-report single \
            --a abc-summary.json \
            --b circt-summary.json \
            --label-a ABC \
            --label-b CIRCT \
            --version "$CIRCT_VERSION" \
            --title "Pass Benchmark (ABC vs CIRCT)" \
            --markdown-out pass-benchmark-report.md \
            --html-out pass-benchmark-report.html

      - name: Publish summary
        run: cat pass-benchmark-report.md >> $GITHUB_STEP_SUMMARY

      - name: Upload pass benchmark artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pass-benchmark-artifacts
          path: |
            build_pass/
            *-summary.json
            pass-benchmark-report.md
            pass-benchmark-report.html

      - name: Prepare deployment files
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          mkdir -p deploy
          cp pass-benchmark-report.html "deploy/report-pass.html" || true
          ls -la deploy/

      - name: Deploy to GitHub Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./deploy
          keep_files: true
