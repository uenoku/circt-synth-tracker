name: AIG LUT Mapping Benchmark

on:
  schedule:
    # Run daily at 13:00 UTC (after comb lowering benchmark)
    - cron: '0 13 * * *'
  workflow_dispatch:
    inputs:
      bitwidths:
        description: 'Comma-separated list of bitwidths to test (e.g. "16,32")'
        required: false
        default: '16'
      abc_commands:
        description: 'ABC commands to run on AIG after LUT mapping via %AIG_TOOL'
        required: false
        default: ''
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  benchmark:
    name: AIG LUT Mapping Benchmark
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/circt/images/circt-integration-test:v20
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install jq
        run: |
          apt-get update && apt-get install -y jq

      - name: Install CIRCT nightly
        uses: circt/install-circt@3f8dda6e1c1965537b5801a43c81c287bac4eae4 # v1.1.1
        with:
          version: 'nightly'
          github-token: ${{ github.token }}

      - name: Add CIRCT to PATH
        run: |
          echo "$GITHUB_WORKSPACE/circt/bin" >> $GITHUB_PATH

      - name: Get CIRCT version
        run: |
          CIRCT_VERSION=$(circt-synth --version | tail -1 | xargs)
          echo "CIRCT_VERSION=$CIRCT_VERSION" >> $GITHUB_ENV
          echo "CIRCT Version: $CIRCT_VERSION"

      - name: Setup tracker
        uses: ./.github/actions/setup-tracker
