name: AIG Pass Benchmark

on:
  schedule:
    - cron: '0 13 * * *'
  workflow_dispatch:
    inputs:
      lut_size:
        description: 'LUT size (K) shared between CIRCT and ABC'
        required: false
        default: '6'
      cut_size:
        description: 'Cut size (C) shared between CIRCT and ABC'
        required: false
        default: '8'

permissions:
  contents: read

jobs:
  benchmark:
    name: CIRCT vs ABC Pass Compile Time
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/circt/images/circt-integration-test:v20
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install jq
        run: apt-get update && apt-get install -y jq

      - name: Install CIRCT nightly
        uses: circt/install-circt@3f8dda6e1c1965537b5801a43c81c287bac4eae4 # v1.1.1
        with:
          version: 'nightly'
          github-token: ${{ github.token }}

      - name: Add CIRCT to PATH
        run: echo "$GITHUB_WORKSPACE/circt/bin" >> $GITHUB_PATH

      - name: Get CIRCT version
        run: |
          CIRCT_VERSION=$(circt-synth --version | tail -1 | xargs)
          echo "CIRCT_VERSION=$CIRCT_VERSION" >> $GITHUB_ENV
          echo "CIRCT Version: $CIRCT_VERSION"

      - name: Setup tracker
        uses: ./.github/actions/setup-tracker

      - name: Run pass benchmarks with lit
        run: |
          source .venv/bin/activate
          LUT_SIZE="${{ github.event.inputs.lut_size || '6' }}"
          CUT_SIZE="${{ github.event.inputs.cut_size || '8' }}"
          lit -v benchmarks/pass/ \
            -DTEST_OUTPUT_DIR=build_pass \
            -DLUT_SIZE=$LUT_SIZE \
            -DCUT_SIZE=$CUT_SIZE

      - name: Aggregate pass benchmark results
        run: |
          source .venv/bin/activate
          aggregate-results --tool circt-lut-mapping-pass --version "$CIRCT_VERSION" --results-dir build_pass -o circt-lut-summary.json
          aggregate-results --tool abc-lut-mapping-pass --version "$CIRCT_VERSION" --results-dir build_pass -o abc-lut-summary.json
          aggregate-results --tool circt-sop-balancing-pass --version "$CIRCT_VERSION" --results-dir build_pass -o circt-sop-summary.json
          aggregate-results --tool abc-sop-balancing-pass --version "$CIRCT_VERSION" --results-dir build_pass -o abc-sop-summary.json

      - name: Build report-only markdown summary
        run: |
          python3 - <<'PY'
          import json
          import math

          def load(path):
              with open(path) as f:
                  return json.load(f)

          def ratios(a, b):
              out = []
              shared = set(a["benchmarks"]).intersection(b["benchmarks"])
              for name in sorted(shared):
                  ta = a["benchmarks"][name].get("compile_time_s")
                  tb = b["benchmarks"][name].get("compile_time_s")
                  if not ta or not tb:
                      continue
                  out.append((name, ta, tb, ta / tb))
              return out

          def geomean(vals):
              if not vals:
                  return None
              return math.exp(sum(math.log(v) for v in vals) / len(vals))

          circt_lut = load("circt-lut-summary.json")
          abc_lut = load("abc-lut-summary.json")
          circt_sop = load("circt-sop-summary.json")
          abc_sop = load("abc-sop-summary.json")

          lut_rows = ratios(circt_lut, abc_lut)
          sop_rows = ratios(circt_sop, abc_sop)

          lut_geo = geomean([r[3] for r in lut_rows])
          sop_geo = geomean([r[3] for r in sop_rows])

          with open("pass-benchmark-report.md", "w") as f:
              f.write("## Pass Benchmark (Report-only)\n\n")
              f.write(f"- CIRCT version: `{circt_lut.get('version', 'unknown')}`\n")
              f.write(f"- LUT mode geomean (CIRCT/ABC): `{lut_geo:.3f}`\n" if lut_geo else "- LUT mode geomean: `n/a`\n")
              f.write(f"- SOP mode geomean (CIRCT/ABC): `{sop_geo:.3f}`\n\n" if sop_geo else "- SOP mode geomean: `n/a`\n\n")

              f.write("### LUT Mapping\n\n")
              f.write("| Benchmark | CIRCT (s) | ABC (s) | CIRCT/ABC |\n")
              f.write("|---|---:|---:|---:|\n")
              for n, tc, ta, r in lut_rows[:50]:
                  f.write(f"| {n} | {tc:.4f} | {ta:.4f} | {r:.3f} |\n")

              f.write("\n### SOP Balancing\n\n")
              f.write("| Benchmark | CIRCT (s) | ABC (s) | CIRCT/ABC |\n")
              f.write("|---|---:|---:|---:|\n")
              for n, tc, ta, r in sop_rows[:50]:
                  f.write(f"| {n} | {tc:.4f} | {ta:.4f} | {r:.3f} |\n")
          PY

      - name: Publish summary
        run: cat pass-benchmark-report.md >> $GITHUB_STEP_SUMMARY

      - name: Upload pass benchmark artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pass-benchmark-artifacts
          path: |
            build_pass/
            *-summary.json
            pass-benchmark-report.md
