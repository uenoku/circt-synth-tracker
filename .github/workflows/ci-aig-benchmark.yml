name: AIG LUT Mapping Benchmark

on:
  schedule:
    # Run daily at 13:00 UTC (after comb lowering benchmark)
    - cron: '0 13 * * *'
  workflow_dispatch:
    inputs:
      bitwidths:
        description: 'Comma-separated list of bitwidths to test (e.g. "16,32")'
        required: false
        default: '16'
      abc_commands:
        description: 'ABC commands to run on AIG after LUT mapping via %AIG_TOOL'
        required: false
        default: ''
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  benchmark:
    name: AIG LUT Mapping Benchmark
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/circt/images/circt-integration-test:v20
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install jq
        run: |
          apt-get update && apt-get install -y jq

      - name: Install CIRCT nightly
        uses: circt/install-circt@3f8dda6e1c1965537b5801a43c81c287bac4eae4 # v1.1.1
        with:
          version: 'nightly'
          github-token: ${{ github.token }}

      - name: Add CIRCT to PATH
        run: |
          echo "$GITHUB_WORKSPACE/circt/bin" >> $GITHUB_PATH

      - name: Get CIRCT version
        run: |
          CIRCT_VERSION=$(circt-synth --version | tail -1 | xargs)
          echo "CIRCT_VERSION=$CIRCT_VERSION" >> $GITHUB_ENV
          echo "CIRCT Version: $CIRCT_VERSION"

      - name: Setup tracker
        uses: ./.github/actions/setup-tracker

      - name: Run AIG LUT mapping tests (CIRCT)
        run: |
          source .venv/bin/activate
          ABC_PARAM=""
          [ -n "${{ inputs.abc_commands }}" ] && ABC_PARAM="-DABC_COMMANDS=\"${{ inputs.abc_commands }}\""
          IFS=',' read -ra BWS <<< "${{ github.event.inputs.bitwidths || '16' }}"
          for BW in "${BWS[@]}"; do
            lit -v benchmarks/aig/ \
              -DSYNTH_TOOL=circt \
              -DTEST_OUTPUT_DIR=build_aig_lsils \
              -DBW=$BW \
              $ABC_PARAM || true
          done

      - name: Aggregate results
        run: |
          source .venv/bin/activate
          aggregate-results \
            --tool "circt" \
            --version "${{ env.CIRCT_VERSION }}" \
            --results-dir build_aig_lsils \
            -o aig-summary.json

      - name: Upload AIG benchmark artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: aig-benchmark-results
          path: |
            aig-summary.json
            build_aig_lsils/

      - name: Post results summary
        if: always()
        run: |
          echo "## CIRCT AIG LUT Mapping Benchmark Results" >> $GITHUB_STEP_SUMMARY
          echo "**CIRCT Version:** \`${CIRCT_VERSION}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f aig-summary.json ]; then
            echo "**Benchmarks:** $(jq '.total_benchmarks' aig-summary.json)" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Results" >> $GITHUB_STEP_SUMMARY
            echo '```json' >> $GITHUB_STEP_SUMMARY
            jq '.benchmarks | to_entries | .[] | "\(.key): \(.value.gates // "N/A") gates, depth: \(.value.depth // "N/A")"' aig-summary.json >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi

      - name: Append results to history
        if: (github.event_name == 'schedule' || (github.event_name == 'push' && github.ref == 'refs/heads/main')) && always()
        run: |
          source .venv/bin/activate
          curl -s -f \
            -H "Authorization: Bearer ${{ github.token }}" \
            -H "Accept: application/vnd.github.raw+json" \
            "https://api.github.com/repos/${{ github.repository }}/contents/aig-history.json?ref=gh-pages" \
            > aig-history.json || echo "[]" > aig-history.json
          append-history \
            --circt aig-summary.json \
            -o aig-history.json \
            --max-days 90

      - name: Generate AIG time series report
        if: (github.event_name == 'schedule' || (github.event_name == 'push' && github.ref == 'refs/heads/main')) && always()
        run: |
          source .venv/bin/activate
          timeseries-report aig-history.json -o aig-timeseries.html || true

      - name: Prepare deployment files
        if: (github.event_name == 'schedule' || (github.event_name == 'push' && github.ref == 'refs/heads/main')) && always()
        run: |
          mkdir -p deploy
          cp -v aig-timeseries.html deploy/ 2>/dev/null || true
          cp -v aig-history.json deploy/ 2>/dev/null || true
          ls -la deploy/

      - name: Deploy AIG reports to GitHub Pages
        if: (github.event_name == 'schedule' || (github.event_name == 'push' && github.ref == 'refs/heads/main')) && always()
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./deploy
          keep_files: true
          destination_dir: aig-benchmark
