name: CIRCT PR Pass Benchmark

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'CIRCT PR number to benchmark (e.g. 12345)'
        required: true
        type: string
      lut_sizes:
        description: 'Comma-separated LUT sizes K (e.g. "6,8")'
        required: false
        default: '6,8'
      cut_sizes:
        description: 'Comma-separated cut sizes C (e.g. "8,15")'
        required: false
        default: '8,15'
      issue_number:
        description: 'Tracker issue number to post results to (optional)'
        required: false
        type: string

permissions:
  contents: write
  pages: write

jobs:
  benchmark:
    name: Pass benchmark CIRCT PR #${{ inputs.pr_number }}
    runs-on: ubuntu-24.04

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout tracker repository
        uses: actions/checkout@v4
        with:
          path: tracker
          submodules: recursive

      - name: Install native runner packages
        uses: ./tracker/.github/actions/setup-ubuntu-ci-tools
        with:
          packages: yosys lld

      - name: Get PR info from llvm/circt
        id: pr-info
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ inputs.pr_number }}
        run: |
          BASE_SHA=$(gh pr view "$PR_NUMBER" --repo llvm/circt --json baseRefOid --jq '.baseRefOid')
          HEAD_SHA=$(gh pr view "$PR_NUMBER" --repo llvm/circt --json headRefOid --jq '.headRefOid')
          PR_TITLE=$(gh pr view "$PR_NUMBER" --repo llvm/circt --json title --jq '.title')
          echo "base_sha=$BASE_SHA" >> $GITHUB_OUTPUT
          echo "head_sha=$HEAD_SHA" >> $GITHUB_OUTPUT
          echo "pr_title=$PR_TITLE" >> $GITHUB_OUTPUT
          # Save the PR diff to be applied on top of the artifact commit
          gh pr diff "$PR_NUMBER" --repo llvm/circt > "$GITHUB_WORKSPACE/pr.patch"
          if [ ! -s "$GITHUB_WORKSPACE/pr.patch" ]; then
            echo "::error::PR diff is empty or could not be retrieved for PR #$PR_NUMBER"
            exit 1
          fi
          echo "Saved PR diff to pr.patch ($(wc -l < "$GITHUB_WORKSPACE/pr.patch") lines)"

      - name: Download pre-built CIRCT (base binaries + LLVM/MLIR install)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BASE_SHA="${{ steps.pr-info.outputs.base_sha }}"
          # Search the latest 30 successful main runs: large enough to usually
          # cover normal PR/base lag, small enough to keep `gh run list` quick.
          ARTIFACT_SEARCH_LIMIT=30

          # Prefer an artifact built at exactly the PR's base commit so the diff applies cleanly.
          # Search only a recent window to keep queries fast while still handling
          # normal PR turnaround time.
          RUN_ID=$(gh run list \
            --repo llvm/circt \
            --workflow uploadReleaseArtifacts.yml \
            --branch main \
            --status success \
            --limit "$ARTIFACT_SEARCH_LIMIT" \
            --json databaseId,headSha | \
            jq -r --arg sha "$BASE_SHA" \
              'map(select(.headSha == $sha)) | .[0].databaseId // empty')

          if [ -n "$RUN_ID" ]; then
            echo "Found artifact run at PR base SHA ${BASE_SHA}: run $RUN_ID"
          else
            echo "No artifact run found at PR base SHA ${BASE_SHA}; falling back to latest"
            RUN_ID=$(gh run list \
              --repo llvm/circt \
              --workflow uploadReleaseArtifacts.yml \
              --branch main \
              --status success \
              --limit 1 \
              --json databaseId \
              --jq '.[0].databaseId')
          fi
          if [ -z "$RUN_ID" ]; then
            echo "::error::Failed to resolve a successful llvm/circt artifact run ID"
            exit 1
          fi

          # Get the commit SHA for the downloaded artifact run
          ARTIFACT_SHA=$(gh run view "$RUN_ID" --repo llvm/circt --json headSha --jq '.headSha')
          echo "ARTIFACT_SHA=$ARTIFACT_SHA" >> $GITHUB_ENV
          echo "Artifact build commit: ${ARTIFACT_SHA:0:8}"
          echo "Downloading circt-full-shared-linux-x64.tar.gz from run $RUN_ID"
          gh run download "$RUN_ID" \
            --repo llvm/circt \
            --name "circt-full-shared-linux-x64.tar.gz" \
            --dir .
          mkdir -p circt-prebuilt
          tar xzf circt-full-shared-linux-x64.tar.gz -C circt-prebuilt/
          # Avoid stale CIRCT headers from the prebuilt artifact shadowing
          # headers generated/used by the PR checkout.
          find "$GITHUB_WORKSPACE/circt-prebuilt" -type d -path "*/include/circt" -prune -exec rm -rf {} +
          MLIR_CMAKE_DIR=$(find "$GITHUB_WORKSPACE/circt-prebuilt" -name "MLIRConfig.cmake" -type f -exec dirname {} \; | head -1)
          LLVM_CMAKE_DIR=$(find "$GITHUB_WORKSPACE/circt-prebuilt" -name "LLVMConfig.cmake" -type f -exec dirname {} \; | head -1)
          PREBUILT_BIN_DIR=$(find "$GITHUB_WORKSPACE/circt-prebuilt" -name "circt-synth" -type f -exec dirname {} \; | head -1)
          PREBUILT_LIB_DIR=$(dirname "$(dirname "$LLVM_CMAKE_DIR")")
          echo "MLIR_DIR=$MLIR_CMAKE_DIR" >> $GITHUB_ENV
          echo "LLVM_DIR=$LLVM_CMAKE_DIR" >> $GITHUB_ENV
          echo "$PREBUILT_BIN_DIR" >> $GITHUB_PATH
          echo "LD_LIBRARY_PATH=$PREBUILT_LIB_DIR${LD_LIBRARY_PATH:+:$LD_LIBRARY_PATH}" >> $GITHUB_ENV

      - name: Setup sccache (for CIRCT compilation)
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: sccache-circt-${{ runner.os }}-20260107030736
          restore-keys: sccache-circt-${{ runner.os }}-
          max-size: 1G
          variant: sccache

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Install Python dependencies and build aig-judge
        working-directory: tracker
        run: |
          uv sync
          uv run prepare

      - name: Build CIRCT at artifact SHA (before)
        uses: ./tracker/.github/actions/build-circt-at-sha
        with:
          ref: ${{ env.ARTIFACT_SHA }}
          checkout_path: circt-base
          build_path: circt-base/build
          mlir_dir: ${{ env.MLIR_DIR }}
          llvm_dir: ${{ env.LLVM_DIR }}

      - name: Run pass benchmarks (before)
        run: |
          CIRCT_BINDIR="$GITHUB_WORKSPACE/circt-base/build/bin"
          CIRCT_LIBDIR="$GITHUB_WORKSPACE/circt-base/build/lib"
          export PATH="$CIRCT_BINDIR:$PATH"
          export LD_LIBRARY_PATH="$CIRCT_LIBDIR${LD_LIBRARY_PATH:+:$LD_LIBRARY_PATH}"
          export CIRCT_SYNTH="$CIRCT_BINDIR/circt-synth"
          export CIRCT_TRANSLATE="$CIRCT_BINDIR/circt-translate"
          export CIRCT_OPT="$CIRCT_BINDIR/circt-opt"
          BEFORE_VERSION=$("$CIRCT_SYNTH" --version | tail -1 | xargs)
          echo "CIRCT_VERSION_BEFORE=$BEFORE_VERSION" >> $GITHUB_ENV
          cd tracker
          source .venv/bin/activate
          LUT_SIZES="${{ inputs.lut_sizes || '6,8' }}"
          CUT_SIZES="${{ inputs.cut_sizes || '8,15' }}"
          IFS=',' read -ra LUT_ARR <<< "$LUT_SIZES"
          IFS=',' read -ra CUT_ARR <<< "$CUT_SIZES"
          for TOOL in circt abc; do
            TOOL_OUT_DIR="build_pass_before/$TOOL"
            for L in "${LUT_ARR[@]}"; do
              for C in "${CUT_ARR[@]}"; do
                lit -v benchmarks/pass/ \
                  -j "$(nproc)" \
                  -DTEST_OUTPUT_DIR="$TOOL_OUT_DIR" \
                  -DLUT_SIZE=$L \
                  -DCUT_SIZE=$C \
                  -DTOOL=$TOOL
              done
            done
          done
          aggregate-results --tool 'circt-*-pass' --version "$BEFORE_VERSION" --results-dir build_pass_before/circt -o circt-base.json
          aggregate-results --tool 'abc-*-pass' --version "$BEFORE_VERSION" --results-dir build_pass_before/abc -o abc-base.json

      - name: Build CIRCT at artifact SHA + PR diff (after)
        uses: ./tracker/.github/actions/build-circt-at-sha
        with:
          ref: ${{ env.ARTIFACT_SHA }}
          checkout_path: circt-pr
          build_path: circt-pr/build
          mlir_dir: ${{ env.MLIR_DIR }}
          llvm_dir: ${{ env.LLVM_DIR }}
          patch: pr.patch
          patch_base_sha: ${{ steps.pr-info.outputs.base_sha }}
          commit_after_patch: 'true'

      - name: Run pass benchmarks (after)
        run: |
          CIRCT_BINDIR="$GITHUB_WORKSPACE/circt-pr/build/bin"
          CIRCT_LIBDIR="$GITHUB_WORKSPACE/circt-pr/build/lib"
          export PATH="$CIRCT_BINDIR:$PATH"
          export LD_LIBRARY_PATH="$CIRCT_LIBDIR${LD_LIBRARY_PATH:+:$LD_LIBRARY_PATH}"
          export CIRCT_SYNTH="$CIRCT_BINDIR/circt-synth"
          export CIRCT_TRANSLATE="$CIRCT_BINDIR/circt-translate"
          export CIRCT_OPT="$CIRCT_BINDIR/circt-opt"
          AFTER_VERSION=$("$CIRCT_SYNTH" --version | tail -1 | xargs)
          echo "CIRCT_VERSION_AFTER=$AFTER_VERSION" >> $GITHUB_ENV
          cd tracker
          source .venv/bin/activate
          LUT_SIZES="${{ inputs.lut_sizes || '6,8' }}"
          CUT_SIZES="${{ inputs.cut_sizes || '8,15' }}"
          IFS=',' read -ra LUT_ARR <<< "$LUT_SIZES"
          IFS=',' read -ra CUT_ARR <<< "$CUT_SIZES"
          for TOOL in circt abc; do
            TOOL_OUT_DIR="build_pass_after/$TOOL"
            for L in "${LUT_ARR[@]}"; do
              for C in "${CUT_ARR[@]}"; do
                lit -v benchmarks/pass/ \
                  -j "$(nproc)" \
                  -DTEST_OUTPUT_DIR="$TOOL_OUT_DIR" \
                  -DLUT_SIZE=$L \
                  -DCUT_SIZE=$C \
                  -DTOOL=$TOOL
              done
            done
          done
          aggregate-results --tool 'circt-*-pass' --version "$AFTER_VERSION" --results-dir build_pass_after/circt -o circt-pr.json
          aggregate-results --tool 'abc-*-pass' --version "$AFTER_VERSION" --results-dir build_pass_after/abc -o abc-pr.json

      - name: Build unified pass PR comparison report
        env:
          PR_TITLE: ${{ steps.pr-info.outputs.pr_title }}
          PR_NUMBER: ${{ inputs.pr_number }}
          HEAD_SHA: ${{ steps.pr-info.outputs.head_sha }}
        run: |
          cd tracker
          source .venv/bin/activate
          pass-pr-compare-report pr \
            --before circt-base.json \
            --after circt-pr.json \
            --label-a "Base" \
            --label-b "PR" \
            --ref-before abc-base.json \
            --ref-after abc-pr.json \
            --ref-label ABC \
            --before-version "${CIRCT_VERSION_BEFORE}" \
            --after-version "${CIRCT_VERSION_AFTER}" \
            --pr-number "$PR_NUMBER" \
            --pr-title "$PR_TITLE" \
            --base-sha "$ARTIFACT_SHA" \
            --head-sha "$HEAD_SHA" \
            --markdown-out pr-pass-compare.md \
            --html-out pr-pass-compare.html

      - name: Post results to GitHub Actions summary
        if: always()
        env:
          PR_TITLE: ${{ steps.pr-info.outputs.pr_title }}
          PR_NUMBER: ${{ inputs.pr_number }}
          HEAD_SHA: ${{ steps.pr-info.outputs.head_sha }}
        run: |
          {
            echo "## CIRCT PR #${PR_NUMBER} Pass Benchmark"
            echo ""
            echo "**[${PR_TITLE}](https://github.com/llvm/circt/pull/${PR_NUMBER})**"
            echo ""
            echo "| | Base | PR |"
            echo "|---|---|---|"
            printf "| Commit | \`%.8s\` | \`%.8s\` |\n" \
              "$ARTIFACT_SHA" \
              "$HEAD_SHA"
            echo "| Version | \`${CIRCT_VERSION_BEFORE}\` | \`${CIRCT_VERSION_AFTER}\` |"
            echo ""
            [ -f tracker/pr-pass-compare.md ] && cat tracker/pr-pass-compare.md
          } >> $GITHUB_STEP_SUMMARY

      - name: Post pass benchmark comment to tracker issue
        if: always() && inputs.issue_number != ''
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const prNumber = '${{ inputs.pr_number }}';
            const prTitle = '${{ steps.pr-info.outputs.pr_title }}';
            const baseSha = '${{ env.ARTIFACT_SHA }}'.slice(0, 8);
            const headSha = '${{ steps.pr-info.outputs.head_sha }}'.slice(0, 8);
            const baseVer = process.env.CIRCT_VERSION_BEFORE || 'unknown';
            const prVer = process.env.CIRCT_VERSION_AFTER || 'unknown';
            const pagesUrl = `https://${context.repo.owner}.github.io/${context.repo.repo}/pr-benchmarks/pr-${prNumber}/report-pass.html`;
            let reportBody = '_Report not generated._';
            try {
              reportBody = fs.readFileSync('tracker/pr-pass-compare.md', 'utf8');
            } catch (e) {}

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: parseInt('${{ inputs.issue_number }}'),
              body: [
                `## Pass benchmark results for CIRCT PR [#${prNumber}](https://github.com/llvm/circt/pull/${prNumber})`,
                `[📊 View report](${pagesUrl}) | [📦 Artifacts](${runUrl})`,
                '',
                `> **${prTitle}**`,
                '',
                '| | Base | PR |',
                '|---|---|---|',
                `| Commit | \`${baseSha}\` | \`${headSha}\` |`,
                `| Version | \`${baseVer}\` | \`${prVer}\` |`,
                '',
                reportBody,
              ].join('\n'),
            });
        env:
          CIRCT_VERSION_BEFORE: ${{ env.CIRCT_VERSION_BEFORE }}
          CIRCT_VERSION_AFTER: ${{ env.CIRCT_VERSION_AFTER }}

      - name: Upload pass benchmark artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pr-${{ inputs.pr_number }}-pass-benchmark
          retention-days: 90
          path: |
            tracker/build_pass_before/
            tracker/build_pass_after/
            tracker/*-summary.json
            tracker/pr-pass-compare.md
            tracker/pr-pass-compare.html

      - name: Prepare deployment files
        if: always()
        run: |
          # Create directory structure for deployment
          PR_DIR="deploy/pr-benchmarks/pr-${{ inputs.pr_number }}"
          mkdir -p "$PR_DIR"

          # Publish unified pass comparison report
          cp tracker/pr-pass-compare.html "$PR_DIR/report-pass.html" || true

          echo "Deployment files prepared:"
          ls -la deploy/

      - name: Deploy to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./deploy
          keep_files: true
