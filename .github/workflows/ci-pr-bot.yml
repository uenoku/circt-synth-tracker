name: PR Benchmark Bot

on:
  issue_comment:
    types: [created]

permissions:
  issues: write
  actions: write

jobs:
  dispatch:
    # Only run when the comment contains one of the trigger phrases.
    # Exclude bot-authored comments to prevent self-triggering when the
    # watcher embeds a parseable bot command in its acknowledgment comment.
    if: >-
      github.event.comment.user.type != 'Bot' &&
      (contains(github.event.comment.body, '@circt-tracker-bot check-pr') ||
      contains(github.event.comment.body, '@circt-tracker-bot rerun'))
    runs-on: ubuntu-latest

    steps:
      - name: Checkout tracker repository
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            src/circt_synth_tracker/utils/pr_comment_parser.py
          sparse-checkout-cone-mode: false

      - name: Check author permission
        id: auth
        uses: actions/github-script@v7
        with:
          script: |
            const allowed = ['OWNER', 'MEMBER', 'COLLABORATOR'];
            const assoc = context.payload.comment.author_association;
            if (!allowed.includes(assoc)) {
              core.setOutput('authorized', 'false');
              console.log(`Unauthorized: ${context.payload.comment.user.login} (${assoc})`);
            } else {
              core.setOutput('authorized', 'true');
              console.log(`Authorized: ${context.payload.comment.user.login} (${assoc})`);
            }

      - name: Resolve effective comment for rerun
        id: resolve
        if: steps.auth.outputs.authorized == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const commentBody = context.payload.comment.body;

            if (!commentBody.includes('@circt-tracker-bot rerun')) {
              core.setOutput('body', commentBody);
              return;
            }

            // Fetch all issue comments to find the last check-pr command
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
            });

            const currentCommentId = context.payload.comment.id;
            const prevCommand = [...comments]
              .reverse()
              .find(c =>
                c.id !== currentCommentId &&
                c.body.includes('@circt-tracker-bot') &&
                /check-pr/.test(c.body) &&
                !c.body.includes('@circt-tracker-bot rerun')
              );

            if (!prevCommand) {
              core.setFailed('No previous @circt-tracker-bot check-pr command found in this issue.');
              return;
            }

            console.log(`Rerunning command from comment #${prevCommand.id}`);
            core.setOutput('body', prevCommand.body);

      - name: Parse benchmark command from comment
        id: parse
        if: steps.auth.outputs.authorized == 'true'
        env:
          COMMENT: ${{ steps.resolve.outputs.body }}
        run: |
          PYTHONPATH="$GITHUB_WORKSPACE/src" python3 - <<'PY'
          import os
          import sys
          from circt_synth_tracker.utils.pr_comment_parser import parse_benchmark_comment

          comment = os.environ["COMMENT"]
          output_path = os.environ["GITHUB_OUTPUT"]
          try:
              command = parse_benchmark_comment(comment)
          except ValueError as exc:
              print(f"::error::{exc}")
              sys.exit(1)

          with open(output_path, "a", encoding="utf-8") as output:
              output.write(f"mode={command.mode}\n")
              output.write(f"pr_number={command.pr_number}\n")
              output.write(f"extra_args={command.extra_args}\n")

          print(f"Parsed PR number: {command.pr_number}")
          if command.extra_args:
              print(f"Parsed extra args: {command.extra_args}")
          PY

      - name: React to comment with rocket
        if: steps.auth.outputs.authorized == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: ${{ github.event.comment.id }},
              content: 'rocket',
            });

      - name: Dispatch benchmark workflow
        id: dispatch
        if: steps.auth.outputs.authorized == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ steps.parse.outputs.mode }}" = "pass" ]; then
            gh workflow run ci-pr-pass-benchmark.yml \
              --repo "${{ github.repository }}" \
              --field pr_number="${{ steps.parse.outputs.pr_number }}" \
              --field issue_number="${{ github.event.issue.number }}"
          elif [ "${{ steps.parse.outputs.mode }}" = "quick" ]; then
            gh workflow run ci-pr-benchmark.yml \
              --repo "${{ github.repository }}" \
              --field pr_number="${{ steps.parse.outputs.pr_number }}" \
              --field bitwidths="16,48" \
              --field issue_number="${{ github.event.issue.number }}" \
              --field extra_circt_synth_args="${{ steps.parse.outputs.extra_args }}" \
              --field equiv_check=false \
              --field enable_tv=false
          else
            gh workflow run ci-pr-benchmark.yml \
              --repo "${{ github.repository }}" \
              --field pr_number="${{ steps.parse.outputs.pr_number }}" \
              --field bitwidths="16,48" \
              --field issue_number="${{ github.event.issue.number }}" \
              --field extra_circt_synth_args="${{ steps.parse.outputs.extra_args }}"
            gh workflow run ci-pr-pass-benchmark.yml \
              --repo "${{ github.repository }}" \
              --field pr_number="${{ steps.parse.outputs.pr_number }}" \
              --field issue_number="${{ github.event.issue.number }}"
          fi
          echo "Dispatched benchmark for CIRCT PR #${{ steps.parse.outputs.pr_number }} (mode=${{ steps.parse.outputs.mode }})"

      - name: Post acknowledgment comment
        if: steps.auth.outputs.authorized == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = '${{ steps.parse.outputs.pr_number }}';
            const mode = '${{ steps.parse.outputs.mode }}';
            const workflowFile = mode === 'pass' ? 'ci-pr-pass-benchmark.yml' : 'ci-pr-benchmark.yml';
            const workflowUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/workflows/${workflowFile}`;
            const extraArgs = '${{ steps.parse.outputs.extra_args }}';
            const modeNote = mode === 'pass'
              ? '🧪 Running **pass benchmark mode** (AIG/pass track only).'
              : (mode === 'quick'
                ? '⚡ Running in **quick mode** (no translation validation or equivalence check).'
                : '🔍 Running **full verification** (standard benchmark + pass benchmark, with translation validation and equivalence check on the standard flow).');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ github.event.issue.number }},
              body: [
                `🤖 Benchmark triggered for [CIRCT PR #${prNumber}](https://github.com/llvm/circt/pull/${prNumber})!`,
                '',
                modeNote,
                ...(extraArgs ? ['', `Extra CIRCT synth args: \`${extraArgs}\``] : []),
                '',
                'Building CIRCT from source before and after the PR; this takes a while.',
                `Results will be posted here when done. [View workflow runs](${workflowUrl})`,
              ].join('\n'),
            });

      - name: Post unauthorized comment
        if: steps.auth.outputs.authorized == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ github.event.issue.number }},
              body: '🤖 Sorry, only repository collaborators can trigger benchmarks.',
            });
