name: PR Benchmark Bot

on:
  issue_comment:
    types: [created]

permissions:
  issues: write
  actions: write

jobs:
  dispatch:
    # Only run when the comment contains one of the trigger phrases
    if: contains(github.event.comment.body, '@circt-tracker-bot check-pr')
    runs-on: ubuntu-latest

    steps:
      - name: Check author permission
        id: auth
        uses: actions/github-script@v7
        with:
          script: |
            const allowed = ['OWNER', 'MEMBER', 'COLLABORATOR'];
            const assoc = context.payload.comment.author_association;
            if (!allowed.includes(assoc)) {
              core.setOutput('authorized', 'false');
              console.log(`Unauthorized: ${context.payload.comment.user.login} (${assoc})`);
            } else {
              core.setOutput('authorized', 'true');
              console.log(`Authorized: ${context.payload.comment.user.login} (${assoc})`);
            }

      - name: Parse PR number from comment
        id: parse
        if: steps.auth.outputs.authorized == 'true'
        run: |
          COMMENT="${{ github.event.comment.body }}"
          # Try check-pr-pass first, then check-pr-quick, then check-pr.
          PR_NUM=$(echo "$COMMENT" | grep -oP '@circt-tracker-bot check-pr-pass \K[0-9]+' | head -1)
          if [ -n "$PR_NUM" ]; then
            echo "mode=pass" >> $GITHUB_OUTPUT
          else
            PR_NUM=$(echo "$COMMENT" | grep -oP '@circt-tracker-bot check-pr-quick \K[0-9]+' | head -1)
            if [ -n "$PR_NUM" ]; then
              echo "mode=quick" >> $GITHUB_OUTPUT
            else
              PR_NUM=$(echo "$COMMENT" | grep -oP '@circt-tracker-bot check-pr \K[0-9]+' | head -1)
              echo "mode=full" >> $GITHUB_OUTPUT
            fi
          fi
          if [ -z "$PR_NUM" ]; then
            echo "::error::Could not parse PR number from comment"
            exit 1
          fi
          echo "pr_number=$PR_NUM" >> $GITHUB_OUTPUT
          echo "Parsed PR number: $PR_NUM"

      - name: React to comment with rocket
        if: steps.auth.outputs.authorized == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: ${{ github.event.comment.id }},
              content: 'rocket',
            });

      - name: Dispatch benchmark workflow
        id: dispatch
        if: steps.auth.outputs.authorized == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ steps.parse.outputs.mode }}" = "pass" ]; then
            gh workflow run ci-pr-pass-benchmark.yml \
              --repo "${{ github.repository }}" \
              --field pr_number="${{ steps.parse.outputs.pr_number }}"
          elif [ "${{ steps.parse.outputs.mode }}" = "quick" ]; then
            gh workflow run ci-pr-benchmark.yml \
              --repo "${{ github.repository }}" \
              --field pr_number="${{ steps.parse.outputs.pr_number }}" \
              --field bitwidths="16,48" \
              --field issue_number="${{ github.event.issue.number }}" \
              --field equiv_check=false \
              --field enable_tv=false
          else
            gh workflow run ci-pr-benchmark.yml \
              --repo "${{ github.repository }}" \
              --field pr_number="${{ steps.parse.outputs.pr_number }}" \
              --field bitwidths="16,48" \
              --field issue_number="${{ github.event.issue.number }}"
          fi
          echo "Dispatched benchmark for CIRCT PR #${{ steps.parse.outputs.pr_number }} (mode=${{ steps.parse.outputs.mode }})"

      - name: Post acknowledgment comment
        if: steps.auth.outputs.authorized == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = '${{ steps.parse.outputs.pr_number }}';
            const mode = '${{ steps.parse.outputs.mode }}';
            const workflowFile = mode === 'pass' ? 'ci-pr-pass-benchmark.yml' : 'ci-pr-benchmark.yml';
            const workflowUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/workflows/${workflowFile}`;
            const modeNote = mode === 'pass'
              ? '🧪 Running **pass benchmark mode** (AIG/pass track only).'
              : (mode === 'quick'
                ? '⚡ Running in **quick mode** (no translation validation or equivalence check).'
                : '🔍 Running **full verification** (with translation validation and equivalence check).');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ github.event.issue.number }},
              body: [
                `🤖 Benchmark triggered for [CIRCT PR #${prNumber}](https://github.com/llvm/circt/pull/${prNumber})!`,
                '',
                modeNote,
                '',
                'Building CIRCT from source before and after the PR; this takes a while.',
                `Results will be posted here when done. [View workflow runs](${workflowUrl})`,
              ].join('\n'),
            });

      - name: Post unauthorized comment
        if: steps.auth.outputs.authorized == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ github.event.issue.number }},
              body: '🤖 Sorry, only repository collaborators can trigger benchmarks.',
            });
